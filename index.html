<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="start-btn">Click Me ❤️</button>
    <audio id="bg-music" src="who-knows.mp3" loop></audio>

    <div id="experience-container">
        
        <div id="p1" class="polaroid"><img src="polaroid1.webp" alt="Memory 1"></div>
        <div id="p2" class="polaroid"><img src="polaroid2.webp" alt="Memory 2"></div>
        <div id="p3" class="polaroid"><img src="polaroid3.webp" alt="Memory 3"></div>
        <div id="p4" class="polaroid"><img src="polaroid4.webp" alt="Memory 4"></div>

        <div id="text-container"></div>
        
        <div class="flower-wrapper" id="flower-wrapper">
            <div class="floating-heart">❤️</div>
            <div class="floating-heart">❤️</div>
            <div class="floating-heart">❤️</div>
            <div class="floating-heart">❤️</div>
            <div class="floating-heart">❤️</div>

            <div class="flower flower-left">
                <div class="stem"><div class="leaf leaf-1"></div><div class="leaf leaf-2"></div></div>
                <div class="bloom"><div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div><div class="petal p4"></div><div class="petal p5"></div><div class="petal p6"></div><div class="petal p7"></div><div class="petal p8"></div></div>
            </div>

            <div class="flower flower-center">
                <div class="stem"><div class="leaf leaf-1"></div><div class="leaf leaf-2"></div></div>
                <div class="bloom"><div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div><div class="petal p4"></div><div class="petal p5"></div><div class="petal p6"></div><div class="petal p7"></div><div class="petal p8"></div></div>
            </div>

            <div class="flower flower-right">
                <div class="stem"><div class="leaf leaf-1"></div><div class="leaf leaf-2"></div></div>
                <div class="bloom"><div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div><div class="petal p4"></div><div class="petal p5"></div><div class="petal p6"></div><div class="petal p7"></div><div class="petal p8"></div></div>
            </div>
        </div>

        <div id="final-message"></div>
        <div id="hint">Click anywhere to continue</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
